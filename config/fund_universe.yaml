    Approved fund universe for 13F-based smart-money positioning analysis.
    CIK numbers marked cik_status: confirmed are high-confidence from known filings.
    CIK numbers marked cik_status: verify require EDGAR lookup before pipeline use.
    Funds with filing_flags require special handling during data ingestion.
    Conditional funds (conditional: true) must pass their threshold check before inclusion.
