# Smart Money — Retail Investor Platform
# Professional financial dashboard theme (dark)

[theme]
base = "dark"
primaryColor = "#60A5FA"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#1E293B"
codeBackgroundColor = "#1E293B"
textColor = "#F1F5F9"
linkColor = "#60A5FA"
borderColor = "#334155"
codeTextColor = "#CBD5E1"
showWidgetBorder = true
showSidebarBorder = true
baseRadius = "6px"
buttonRadius = "6px"

font = "'Inter':https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
headingFont = "'Inter':https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
baseFontSize = 14
baseFontWeight = 400
codeFontSize = "13px"
headingFontSizes = ["28px", "22px", "18px", "16px", "14px", "12px"]
headingFontWeights = [700, 600, 600, 600, 500, 500]
linkUnderline = false

# Semantic colors — used by st.badge and :color[text]
greenColor  = "#34D399"   # STRENGTHENING / gains
redColor    = "#F87171"   # EXIT SIGNAL / losses
yellowColor = "#FBBF24"   # WEAKENING / near-LT lots
orangeColor = "#FB923C"   # alerts
blueColor   = "#60A5FA"   # informational
violetColor = "#A78BFA"   # accent
grayColor   = "#94A3B8"   # HOLDING / neutral

# Chart palette — distinguishable across dark backgrounds
chartCategoricalColors = [
    "#60A5FA",
    "#34D399",
    "#A78BFA",
    "#F87171",
    "#FBBF24",
    "#38BDF8",
    "#94A3B8",
    "#FB923C",
]

chartSequentialColors = [
    "#0C4A6E",
    "#075985",
    "#0369A1",
    "#0284C7",
    "#0EA5E9",
    "#38BDF8",
    "#7DD3FC",
    "#BAE6FD",
    "#E0F2FE",
    "#F0F9FF",
]

dataframeBorderColor = "#334155"
dataframeHeaderBackgroundColor = "#1E293B"

# Sidebar: slightly lighter than main to anchor navigation visually
[theme.sidebar]
backgroundColor = "#1E293B"
secondaryBackgroundColor = "#273549"
codeBackgroundColor = "#1E293B"
textColor = "#F1F5F9"
borderColor = "#334155"
primaryColor = "#60A5FA"
